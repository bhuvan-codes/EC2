name : deploy to ec2
# trigger : when to run
on:
 push:
   branches:
     - main
# what to do?
jobs:
 deploy:
   runs_on: ubuntu-latest 
   steps:
     - name: checkout code
       uses: actions/checkout@v6
     - name: deploy via ssh
       uses: appleboy/ssh-action@v1
       with: 
         host: ${{secrets.SSH_HOST}}
         username: ubuntu
         key: ${{secrets.SSH_KEY}}
         script:
           cd ~/level5
           git pull
           sudo docker compose down
           sudo docker compose -d --build




   